<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المصمم العراقي</title>
<meta name="description" content="المصمم العراقي - أدوات وموارد تصميم">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<!-- Firebase SDK (compat) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics-compat.js"></script>
<style>
/* ============ DESIGN TOKENS ============ */
:root{
  --bg:#0B0D10;
  --bg-soft:#11141A;
  --surface:rgba(255,255,255,0.04);
  --surface-strong:rgba(255,255,255,0.07);
  --border:rgba(255,255,255,0.09);
  --border-strong:rgba(255,255,255,0.16);
  --text:#F3F5F7;
  --text-dim:#9AA3AF;
  --text-faint:#5C6470;
  --blue:#2B6CFF;
  --violet:#7C3AED;
  --gold:#D4AF37;
  --gold-soft:#E8C766;
  --danger:#EF4444;
  --success:#22C55E;
  --grad-brand: linear-gradient(135deg, var(--blue), var(--violet));
  --grad-gold: linear-gradient(135deg, #B98D1E, var(--gold-soft));
  --radius:16px;
  --radius-sm:10px;
  --shadow-lg: 0 24px 60px -20px rgba(0,0,0,0.6);
  --font-display:'Cairo', sans-serif;
  --font-body:'Tajawal', sans-serif;
}
*{box-sizing:border-box; margin:0; padding:0;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-body);
  min-height:100vh;
  overflow-x:hidden;
  position:relative;
}
body::before{
  content:'';
  position:fixed; inset:0;
  background:
    radial-gradient(circle at 15% 0%, rgba(43,108,255,0.16), transparent 45%),
    radial-gradient(circle at 85% 20%, rgba(124,58,237,0.14), transparent 45%);
  pointer-events:none;
  z-index:0;
}
h1,h2,h3,h4,.brand,.btn,.nav-link{font-family:var(--font-display);}
a{color:inherit; text-decoration:none;}
button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit;}
img{max-width:100%; display:block;}
::selection{background:var(--violet); color:#fff;}
:focus-visible{outline:2px solid var(--blue); outline-offset:2px;}

.container{max-width:1180px; margin:0 auto; padding:0 24px;}
.hidden{display:none !important;}
.visually-hidden{position:absolute; width:1px; height:1px; overflow:hidden; opacity:0;}

/* ============ SCROLLBAR ============ */
::-webkit-scrollbar{width:10px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border-strong); border-radius:10px;}

/* ============ TOP BAR / NAV ============ */
.topbar{
  position:sticky; top:0; z-index:100;
  backdrop-filter:blur(16px);
  background:rgba(11,13,16,0.72);
  border-bottom:1px solid var(--border);
}
.topbar-inner{
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 24px;
  max-width:1180px; margin:0 auto;
}
.brand{
  display:flex; align-items:center; gap:10px;
  font-size:20px; font-weight:800; letter-spacing:-0.01em;
}
.brand-mark{
  width:36px; height:36px; border-radius:10px;
  background:var(--grad-brand);
  display:flex; align-items:center; justify-content:center;
  font-size:16px; font-weight:900; color:#fff;
  box-shadow:0 6px 18px -6px rgba(43,108,255,0.6);
  flex-shrink:0;
}
.nav-links{
  display:flex; align-items:center; gap:6px;
}
.nav-link{
  padding:9px 16px; border-radius:99px;
  font-size:14.5px; font-weight:600; color:var(--text-dim);
  transition:.2s;
}
.nav-link:hover{color:var(--text); background:var(--surface);}
.nav-link.active{color:#fff; background:var(--surface-strong); border:1px solid var(--border-strong);}
.nav-link.pro-link{
  display:flex; align-items:center; gap:6px;
}
.nav-link.pro-link .pro-badge-mini{
  font-size:10px; font-weight:800; padding:2px 6px; border-radius:6px;
  background:var(--grad-gold); color:#1a1300;
}
.nav-right{display:flex; align-items:center; gap:10px;}
.icon-btn{
  width:38px; height:38px; border-radius:99px;
  display:flex; align-items:center; justify-content:center;
  background:var(--surface); border:1px solid var(--border);
  transition:.2s;
}
.icon-btn:hover{background:var(--surface-strong);}
.user-chip{
  display:flex; align-items:center; gap:8px;
  padding:5px 12px 5px 6px; border-radius:99px;
  background:var(--surface); border:1px solid var(--border);
  transition:.2s; font-size:14px; font-weight:600;
}
.user-chip:hover{background:var(--surface-strong);}
.user-chip img{width:28px; height:28px; border-radius:99px; object-fit:cover;}
.mobile-menu-btn{display:none;}

/* ============ BUTTONS ============ */
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
  padding:12px 24px; border-radius:12px;
  font-size:15px; font-weight:700;
  transition:.2s; white-space:nowrap;
}
.btn-primary{
  background:var(--grad-brand); color:#fff;
  box-shadow:0 10px 26px -8px rgba(43,108,255,0.55);
}
.btn-primary:hover{transform:translateY(-2px); box-shadow:0 14px 30px -8px rgba(43,108,255,0.7);}
.btn-secondary{
  background:var(--surface); color:var(--text); border:1px solid var(--border-strong);
}
.btn-secondary:hover{background:var(--surface-strong);}
.btn-gold{
  background:var(--grad-gold); color:#241a00;
  box-shadow:0 10px 26px -8px rgba(212,175,55,0.5);
}
.btn-gold:hover{transform:translateY(-2px);}
.btn-ghost{color:var(--text-dim);}
.btn-ghost:hover{color:var(--text);}
.btn-sm{padding:8px 16px; font-size:13.5px; border-radius:9px;}
.btn-block{width:100%;}
.btn-danger{background:rgba(239,68,68,0.12); color:#FCA5A5; border:1px solid rgba(239,68,68,0.3);}
.btn-danger:hover{background:rgba(239,68,68,0.2);}
.btn:disabled{opacity:.5; cursor:not-allowed; transform:none !important;}

/* ============ HERO ============ */
.hero{
  position:relative; z-index:1;
  padding:72px 24px 48px;
  text-align:center;
}
.hero-eyebrow{
  display:inline-flex; align-items:center; gap:8px;
  padding:7px 16px; border-radius:99px;
  background:var(--surface); border:1px solid var(--border-strong);
  font-size:13px; font-weight:700; color:var(--text-dim);
  margin-bottom:22px;
}
.hero-eyebrow .dot{width:7px; height:7px; border-radius:99px; background:var(--success); box-shadow:0 0 0 3px rgba(34,197,94,0.2);}
.hero h1{
  font-size:clamp(34px, 6vw, 58px);
  font-weight:900; line-height:1.15; letter-spacing:-0.02em;
  margin-bottom:18px;
}
.hero h1 .grad-text{
  background:var(--grad-brand);
  -webkit-background-clip:text; background-clip:text; color:transparent;
}
.hero p{
  font-size:17px; color:var(--text-dim); max-width:560px; margin:0 auto 30px;
  line-height:1.8;
}
.hero-actions{display:flex; gap:12px; justify-content:center; flex-wrap:wrap;}

/* ============ SECTION HEADERS ============ */
.section{padding:36px 0 64px; position:relative; z-index:1;}
.section-head{
  display:flex; align-items:flex-end; justify-content:space-between;
  margin-bottom:28px; gap:16px; flex-wrap:wrap;
}
.section-head h2{font-size:26px; font-weight:800;}
.section-head p{color:var(--text-dim); font-size:14.5px; margin-top:6px;}

/* ============ GRID / CARDS ============ */
.grid{
  display:grid; grid-template-columns:repeat(3, 1fr); gap:20px;
}
.card{
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); overflow:hidden;
  display:flex; flex-direction:column;
  transition:.25s; position:relative;
}
.card:hover{
  border-color:var(--border-strong); transform:translateY(-4px);
  box-shadow:var(--shadow-lg);
}
.card-media{
  aspect-ratio:16/10; width:100%; overflow:hidden;
  background:linear-gradient(135deg, #1a1d24, #0f1115);
  position:relative;
}
.card-media img{width:100%; height:100%; object-fit:cover; display:block;}
.card-pro-tag{
  position:absolute; top:10px; left:10px;
  display:flex; align-items:center; gap:5px;
  padding:5px 10px; border-radius:8px;
  background:var(--grad-gold); color:#241a00;
  font-size:11.5px; font-weight:800;
  box-shadow:0 4px 12px -2px rgba(212,175,55,0.5);
}
.card-body{padding:18px 18px 20px; display:flex; flex-direction:column; gap:10px; flex:1;}
.card-body h3{font-size:17px; font-weight:700;}
.card-body p{font-size:14px; color:var(--text-dim); line-height:1.7; flex:1;}
.card-body .btn{margin-top:6px;}

.empty-state{
  text-align:center; padding:60px 20px; color:var(--text-faint);
  border:1px dashed var(--border-strong); border-radius:var(--radius);
}
.empty-state .icon{font-size:36px; margin-bottom:10px; display:block;}
.empty-state strong{color:var(--text-dim); display:block; margin-bottom:6px; font-size:15px;}

.skeleton{
  background:linear-gradient(110deg, var(--surface) 30%, var(--surface-strong) 50%, var(--surface) 70%);
  background-size:200% 100%;
  animation:shimmer 1.6s infinite;
  border-radius:var(--radius);
}
@keyframes shimmer{to{background-position:-200% 0;}}

/* ============ PRO LOCK SECTION ============ */
.pro-gate{
  max-width:480px; margin:40px auto; text-align:center;
  background:radial-gradient(circle at 50% 0%, rgba(212,175,55,0.1), transparent 60%), var(--surface);
  border:1px solid rgba(212,175,55,0.25);
  border-radius:20px; padding:44px 32px;
}
.pro-gate .lock-icon{
  width:64px; height:64px; margin:0 auto 20px;
  border-radius:18px; background:var(--grad-gold);
  display:flex; align-items:center; justify-content:center;
  font-size:28px;
  box-shadow:0 16px 32px -8px rgba(212,175,55,0.5);
  animation:floaty 3s ease-in-out infinite;
}
@keyframes floaty{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
.pro-gate h2{font-size:24px; font-weight:800; margin-bottom:10px;}
.pro-gate p{color:var(--text-dim); font-size:14.5px; line-height:1.8; margin-bottom:22px;}
.pro-steps{
  text-align:right; background:var(--bg-soft); border:1px solid var(--border);
  border-radius:12px; padding:16px 18px; margin-bottom:22px; font-size:13.5px; color:var(--text-dim);
  display:flex; flex-direction:column; gap:10px;
}
.pro-steps div{display:flex; align-items:flex-start; gap:10px;}
.pro-steps .num{
  width:20px; height:20px; border-radius:99px; background:var(--surface-strong);
  display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:800;
  flex-shrink:0; margin-top:1px; color:var(--text);
}
.code-input-row{display:flex; gap:8px; margin-bottom:14px;}
.code-input-row input{
  flex:1; text-align:center; letter-spacing:0.15em; text-transform:uppercase;
  font-weight:800; font-size:16px;
}
.pro-active-badge{
  display:inline-flex; align-items:center; gap:8px;
  background:rgba(212,175,55,0.12); border:1px solid rgba(212,175,55,0.35);
  color:var(--gold-soft); padding:8px 16px; border-radius:99px;
  font-size:13.5px; font-weight:700; margin-bottom:18px;
}

/* ============ FORMS ============ */
.form-group{margin-bottom:16px; text-align:right;}
.form-group label{display:block; font-size:13px; font-weight:700; color:var(--text-dim); margin-bottom:7px;}
input, textarea, select{
  width:100%; padding:12px 14px; border-radius:10px;
  background:var(--bg-soft); border:1px solid var(--border-strong);
  color:var(--text); font-size:14.5px; font-family:inherit;
  transition:.2s;
}
input:focus, textarea:focus, select:focus{border-color:var(--blue); background:rgba(43,108,255,0.06);}
input::placeholder, textarea::placeholder{color:var(--text-faint);}
textarea{resize:vertical; min-height:90px;}
.field-error{color:#FCA5A5; font-size:12.5px; margin-top:6px;}
.field-hint{color:var(--text-faint); font-size:12.5px; margin-top:6px;}
.divider-or{
  display:flex; align-items:center; gap:12px; margin:18px 0;
  color:var(--text-faint); font-size:13px;
}
.divider-or::before, .divider-or::after{content:''; flex:1; height:1px; background:var(--border);}

/* ============ MODAL ============ */
.modal-overlay{
  position:fixed; inset:0; z-index:1000;
  background:rgba(0,0,0,0.65); backdrop-filter:blur(4px);
  display:flex; align-items:center; justify-content:center;
  padding:20px; opacity:0; pointer-events:none; transition:.25s;
}
.modal-overlay.open{opacity:1; pointer-events:auto;}
.modal-box{
  background:var(--bg-soft); border:1px solid var(--border-strong);
  border-radius:18px; padding:30px; width:100%; max-width:420px;
  box-shadow:var(--shadow-lg);
  transform:translateY(16px) scale(0.98); transition:.25s;
  max-height:88vh; overflow-y:auto;
}
.modal-overlay.open .modal-box{transform:translateY(0) scale(1);}
.modal-box.modal-wide{max-width:640px;}
.modal-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:20px;}
.modal-head h3{font-size:19px; font-weight:800;}
.modal-close{
  width:32px; height:32px; border-radius:99px; background:var(--surface);
  display:flex; align-items:center; justify-content:center; font-size:18px; color:var(--text-dim);
}
.modal-close:hover{background:var(--surface-strong); color:var(--text);}
.modal-tabs{display:flex; gap:4px; background:var(--bg); border-radius:11px; padding:4px; margin-bottom:20px;}
.modal-tab{flex:1; text-align:center; padding:9px; border-radius:8px; font-size:13.5px; font-weight:700; color:var(--text-dim);}
.modal-tab.active{background:var(--surface-strong); color:#fff;}

/* ============ TOAST ============ */
.toast-wrap{
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
  z-index:2000; display:flex; flex-direction:column; gap:10px; align-items:center;
  width:100%; max-width:380px; padding:0 16px;
}
.toast{
  display:flex; align-items:center; gap:10px;
  background:var(--bg-soft); border:1px solid var(--border-strong);
  padding:13px 18px; border-radius:12px; font-size:14px; font-weight:600;
  box-shadow:var(--shadow-lg);
  animation:toast-in .25s ease;
  width:100%;
}
@keyframes toast-in{from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);}}
.toast.success{border-color:rgba(34,197,94,0.4);}
.toast.error{border-color:rgba(239,68,68,0.4);}
.toast .toast-icon{font-size:16px; flex-shrink:0;}

/* ============ PROFILE PAGE ============ */
.profile-header{
  display:flex; align-items:center; gap:20px; flex-wrap:wrap;
  background:var(--surface); border:1px solid var(--border); border-radius:18px;
  padding:26px; margin-bottom:28px;
}
.profile-avatar-wrap{position:relative; flex-shrink:0;}
.profile-avatar{
  width:84px; height:84px; border-radius:99px; object-fit:cover;
  border:3px solid var(--border-strong);
}
.profile-info{flex:1; min-width:200px;}
.profile-info h2{font-size:21px; font-weight:800; margin-bottom:4px; display:flex; align-items:center; gap:8px;}
.profile-info .username{color:var(--text-dim); font-size:14px;}
.pro-pill{
  display:inline-flex; align-items:center; gap:5px; font-size:11.5px; font-weight:800;
  padding:3px 10px; border-radius:99px; background:var(--grad-gold); color:#241a00;
}
.profile-actions{display:flex; gap:10px; flex-wrap:wrap;}

/* ============ ADMIN ============ */
.admin-shell{display:flex; min-height:100vh;}
.admin-sidebar{
  width:240px; flex-shrink:0; background:var(--bg-soft); border-left:1px solid var(--border);
  padding:24px 16px; position:sticky; top:0; height:100vh; display:flex; flex-direction:column; gap:6px;
}
.admin-sidebar .brand{padding:0 10px 22px; font-size:17px;}
.admin-nav-item{
  display:flex; align-items:center; gap:10px;
  padding:11px 14px; border-radius:10px; font-size:14px; font-weight:700; color:var(--text-dim);
  transition:.2s;
}
.admin-nav-item:hover{background:var(--surface); color:var(--text);}
.admin-nav-item.active{background:var(--grad-brand); color:#fff;}
.admin-main{flex:1; padding:30px 36px; max-width:100%; overflow-x:hidden;}
.admin-topline{display:flex; align-items:center; justify-content:space-between; margin-bottom:26px; flex-wrap:wrap; gap:12px;}
.admin-topline h1{font-size:24px; font-weight:800;}
.stat-row{display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:28px;}
.stat-card{background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:18px;}
.stat-card .label{font-size:12.5px; color:var(--text-dim); margin-bottom:8px; font-weight:600;}
.stat-card .value{font-size:26px; font-weight:800;}
.admin-table-wrap{background:var(--surface); border:1px solid var(--border); border-radius:14px; overflow:hidden;}
table{width:100%; border-collapse:collapse; font-size:13.5px;}
th{text-align:right; padding:13px 16px; color:var(--text-dim); font-weight:700; font-size:12.5px; border-bottom:1px solid var(--border); white-space:nowrap;}
td{padding:13px 16px; border-bottom:1px solid var(--border); vertical-align:middle;}
tr:last-child td{border-bottom:none;}
td img{width:36px; height:36px; border-radius:8px; object-fit:cover;}
.table-actions{display:flex; gap:6px;}
.mini-btn{
  width:30px; height:30px; border-radius:8px; background:var(--surface);
  border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:13px;
  transition:.2s;
}
.mini-btn:hover{background:var(--surface-strong);}
.badge{display:inline-flex; padding:4px 10px; border-radius:99px; font-size:11.5px; font-weight:700;}
.badge.green{background:rgba(34,197,94,0.12); color:#4ADE80;}
.badge.gray{background:rgba(255,255,255,0.08); color:var(--text-dim);}
.badge.gold{background:rgba(212,175,55,0.15); color:var(--gold-soft);}
.admin-panel{display:none;}
.admin-panel.active{display:block;}
.admin-card{background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:22px; margin-bottom:20px;}
.admin-card h3{font-size:16px; font-weight:800; margin-bottom:16px;}
.form-row-2{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
.code-pill{
  font-family:monospace; font-weight:800; letter-spacing:0.05em;
  background:var(--bg); padding:4px 10px; border-radius:6px; font-size:13px;
}

/* ============ FOOTER ============ */
footer{
  border-top:1px solid var(--border); padding:40px 24px 28px; position:relative; z-index:1;
  background:var(--bg-soft);
}
.footer-inner{
  max-width:1180px; margin:0 auto;
  display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:20px;
}
.footer-brand{display:flex; align-items:center; gap:10px; font-weight:800; font-size:16px;}
.footer-social{display:flex; gap:10px;}
.footer-social a{
  width:40px; height:40px; border-radius:11px; background:var(--surface); border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center; transition:.2s; font-size:17px;
}
.footer-social a:hover{background:var(--surface-strong); transform:translateY(-2px);}
.footer-copy{
  text-align:center; color:var(--text-faint); font-size:13px; margin-top:24px; padding-top:20px;
  border-top:1px solid var(--border); max-width:1180px; margin-inline:auto;
}

/* ============ LOADER ============ */
.page-loader{
  position:fixed; inset:0; z-index:9999; background:var(--bg);
  display:flex; align-items:center; justify-content:center; transition:opacity .4s;
}
.page-loader .spinner{
  width:40px; height:40px; border-radius:99px; border:3px solid var(--border);
  border-top-color:var(--blue); animation:spin 0.8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* ============ UTILITIES ============ */
.text-center{text-align:center;}
.mt-1{margin-top:8px;} .mt-2{margin-top:16px;} .mt-3{margin-top:24px;}
.flex-between{display:flex; align-items:center; justify-content:space-between;}
.gap-2{display:flex; gap:8px;}

/* ============ RESPONSIVE ============ */
@media (max-width:900px){
  .grid{grid-template-columns:repeat(2,1fr);}
  .stat-row{grid-template-columns:repeat(2,1fr);}
  .admin-sidebar{position:fixed; right:-260px; z-index:500; transition:.25s; box-shadow:var(--shadow-lg);}
  .admin-sidebar.open{right:0;}
  .admin-main{padding:24px 18px;}
}
@media (max-width:680px){
  .nav-links{display:none;}
  .mobile-menu-btn{display:flex;}
  .grid{grid-template-columns:1fr;}
  .form-row-2{grid-template-columns:1fr;}
  .hero{padding:50px 18px 36px;}
  .section-head{flex-direction:column; align-items:flex-start;}
  table{font-size:12.5px;}

<div class="toast-wrap" id="toastWrap"></div>

<!-- ============ AUTH MODAL ============ -->
<div class="modal-overlay" id="authModal">
  <div class="modal-box">
    <div class="modal-head">
      <h3 id="authModalTitle">تسجيل الدخول</h3>
      <button class="modal-close" data-close="authModal">✕</button>
    </div>
    <div class="modal-tabs">
      <div class="modal-tab active" data-authtab="login">تسجيل الدخول</div>
      <div class="modal-tab" data-authtab="signup">حساب جديد</div>
    </div>

    <button class="btn btn-secondary btn-block" id="googleAuthBtn">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.71v2.26h2.91c1.7-1.57 2.69-3.88 2.69-6.61z"/><path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.91-2.26c-.81.54-1.85.87-3.05.87-2.34 0-4.32-1.58-5.03-3.71H.95v2.33A9 9 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.97 10.72A5.4 5.4 0 0 1 3.68 9c0-.6.1-1.18.29-1.72V4.95H.95A9 9 0 0 0 0 9c0 1.45.35 2.83.95 4.05l3.02-2.33z"/><path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58A8.93 8.93 0 0 0 9 0 9 9 0 0 0 .95 4.95L3.97 7.28C4.68 5.16 6.66 3.58 9 3.58z"/></svg>
      الدخول عبر Google
    </button>
    <div class="divider-or">أو</div>

    <form id="loginForm">
      <div class="form-group">
        <label>البريد الإلكتروني</label>
        <input type="email" id="loginEmail" placeholder="example@email.com" required>
      </div>
      <div class="form-group">
        <label>كلمة السر</label>
        <input type="password" id="loginPassword" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block">تسجيل الدخول</button>
    </form>

    <form id="signupForm" class="hidden">
      <div class="form-group">
        <label>الاسم الكامل</label>
        <input type="text" id="signupName" placeholder="اسمك" required>
      </div>
      <div class="form-group">
        <label>البريد الإلكتروني</label>
        <input type="email" id="signupEmail" placeholder="example@email.com" required>
      </div>
      <div class="form-group">
        <label>كلمة السر</label>
        <input type="password" id="signupPassword" placeholder="6 أحرف على الأقل" required minlength="6">
      </div>
      <button type="submit" class="btn btn-primary btn-block">إنشاء حساب</button>
    </form>
  </div>
</div>
